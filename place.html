    <div class="first">
        <h2>Data</h2>
        <table class="data">
            <tr><th>Area</th><td>Xxxxx</td></tr>

    <div class="second">
        <h2>Weather</h2>
        <div class="weather">
            <img src="images/weather-icon.svg" alt="Emoji Weather Icon of a Cloud with the Sun">
        </div>

            <tr><th>Temperature</th><td>Xxxxx</td></tr>
